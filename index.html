<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
            overflow: hidden;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .illustration {
            width: 220px;
            height: 220px;
            margin: 0 auto 24px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(233, 69, 96, 0.3);
        }

        .illustration svg {
            width: 160px;
            height: 160px;
        }

        .position-name {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ff6b6b;
        }

        .position-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 28px;
        }

        .filters {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            user-select: none;
        }

        .filter-chip:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.7);
        }

        .filter-chip.active.facile {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
            border-color: rgba(46, 213, 115, 0.5);
        }

        .filter-chip.active.moyen {
            background: rgba(255, 165, 2, 0.2);
            color: #ffa502;
            border-color: rgba(255, 165, 2, 0.5);
        }

        .filter-chip.active.avance {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            border-color: rgba(233, 69, 96, 0.5);
        }

        .hint {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 20px;
        }

        /* Animation d'entrée */
        .fade-in {
            animation: fadeSlide 0.5s ease forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .difficulty {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .difficulty.facile {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .difficulty.moyen {
            background: rgba(255, 165, 2, 0.2);
            color: #ffa502;
            border: 1px solid rgba(255, 165, 2, 0.3);
        }

        .difficulty.avance {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 480px) {
            .card {
                padding: 28px 20px;
            }

            h1 {
                font-size: 1.4rem;
            }

            .illustration {
                width: 180px;
                height: 180px;
            }

            .illustration svg {
                width: 130px;
                height: 130px;
            }

            .position-name {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <h1>Position Generator</h1>

    <div class="filters">
        <div class="filter-chip active facile" data-level="facile" onclick="toggleFilter(this)">Facile</div>
        <div class="filter-chip active moyen" data-level="moyen" onclick="toggleFilter(this)">Moyen</div>
        <div class="filter-chip active avance" data-level="avance" onclick="toggleFilter(this)">Avancé</div>
    </div>

        <div class="illustration" id="illustration"></div>
        <div class="difficulty" id="difficulty"></div>
        <div class="position-name" id="positionName"></div>
        <div class="position-desc" id="positionDesc"></div>
        <div class="hint">Clique ou appuie sur Espace</div>
    </div>

    <footer>Have fun !</footer>

        let lastIndex = -1;
        let activeFilters = new Set(['facile', 'moyen', 'avance']);

        function toggleFilter(el) {
            const level = el.dataset.level;
            if (activeFilters.has(level)) {
                // Ne pas permettre de tout désactiver
                if (activeFilters.size <= 1) return;
                activeFilters.delete(level);
                el.classList.remove('active');
            } else {
                activeFilters.add(level);
                el.classList.add('active');
            }
            generate();
        }

        function generate() {
            const filtered = positions.filter(p => activeFilters.has(p.difficulty));
            if (filtered.length === 0) return;

            let index;
            do {
                index = Math.floor(Math.random() * filtered.length);
            } while (filtered[index] === positions[lastIndex] && filtered.length > 1);

            const pos = filtered[index];
            lastIndex = positions.indexOf(pos);

            const card = document.getElementById('card');
            const illustration = document.getElementById('illustration');
            const name = document.getElementById('positionName');
            const desc = document.getElementById('positionDesc');
            const diff = document.getElementById('difficulty');

            // Animation
            card.classList.remove('fade-in');
            void card.offsetWidth; // force reflow
            card.classList.add('fade-in');

            illustration.innerHTML = pos.svg;
            name.textContent = pos.name;
            desc.textContent = pos.desc;

            diff.textContent = pos.difficulty === 'facile' ? 'Facile' :
                              pos.difficulty === 'moyen' ? 'Moyen' : 'Avancé';
            diff.className = 'difficulty ' + pos.difficulty;
        }

        // Générer au chargement
        generate();

        // Raccourci clavier (Espace)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                generate();
            }
        });
