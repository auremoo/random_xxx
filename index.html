<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
            overflow: hidden;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .illustration {
            width: 220px;
            height: 220px;
            margin: 0 auto 24px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(233, 69, 96, 0.3);
        }

        .illustration svg {
            width: 160px;
            height: 160px;
        }

        .position-name {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ff6b6b;
        }

        .position-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 28px;
        }

        .btn {
            background: linear-gradient(135deg, #e94560, #c23152);
            color: #fff;
            border: none;
            padding: 14px 36px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(233, 69, 96, 0.6);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .dice {
            display: inline-block;
            margin-right: 8px;
            font-size: 1.2rem;
        }

        /* Animation d'entrée */
        .fade-in {
            animation: fadeSlide 0.5s ease forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .difficulty {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .difficulty.facile {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .difficulty.moyen {
            background: rgba(255, 165, 2, 0.2);
            color: #ffa502;
            border: 1px solid rgba(255, 165, 2, 0.3);
        }

        .difficulty.avance {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 480px) {
            .card {
                padding: 28px 20px;
            }

            h1 {
                font-size: 1.4rem;
            }

            .illustration {
                width: 180px;
                height: 180px;
            }

            .illustration svg {
                width: 130px;
                height: 130px;
            }

            .position-name {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

                difficulty: "avance",
                svg: `<svg viewBox="0 0 160 160" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Personne qui porte -->

                    <line x1="70" y1="40" x2="70" y2="90"/>

                    <line x1="90" y1="50" x2="110" y2="42" stroke="#e94560"/>
                </svg>`
            }
        ];

        let lastIndex = -1;

        function generate() {
            let index;
            do {
                index = Math.floor(Math.random() * positions.length);
            } while (index === lastIndex && positions.length > 1);
            lastIndex = index;

            const pos = positions[index];
            const card = document.getElementById('card');
            const illustration = document.getElementById('illustration');
            const name = document.getElementById('positionName');
            const desc = document.getElementById('positionDesc');
            const diff = document.getElementById('difficulty');

            // Animation
            card.classList.remove('fade-in');
            void card.offsetWidth; // force reflow
            card.classList.add('fade-in');

            illustration.innerHTML = pos.svg;
            name.textContent = pos.name;
            desc.textContent = pos.desc;

            diff.textContent = pos.difficulty === 'facile' ? 'Facile' :
                              pos.difficulty === 'moyen' ? 'Moyen' : 'Avancé';
            diff.className = 'difficulty ' + pos.difficulty;
        }

        // Générer au chargement
        generate();

        // Raccourci clavier (Espace)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                generate();
            }
        });
    </script>
