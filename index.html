<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        h1 {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: clamp(20px, 5vw, 40px);
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            cursor: pointer;
            touch-action: manipulation;
        }

        .card:active {
            transform: scale(0.97);
        }

        @media (hover: hover) {
            .card:hover {
                transform: translateY(-2px);
            }
        }

        .illustration {
            width: clamp(150px, 50vw, 220px);
            height: clamp(150px, 50vw, 220px);
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(233, 69, 96, 0.3);
            position: relative;
        }

        .illustration svg {
            width: 75%;
            height: 75%;
        }

        .illustration.detailed svg {
            display: none;
        }

        .illustration img.real-img {
            display: none;
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(233, 69, 96, 0.3));
        }

        .illustration.detailed img.real-img {
            display: block;
        }

        .view-toggle-hint {
            position: absolute;
            bottom: 6px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.2);
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .position-name {
            font-size: clamp(1.2rem, 4.5vw, 1.6rem);
            font-weight: 700;
            margin-bottom: 10px;
            color: #ff6b6b;
        }

        .position-desc {
            font-size: clamp(0.85rem, 3vw, 0.95rem);
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }

        .filters {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 10px 20px;
            border-radius: 50px;
            font-size: clamp(0.8rem, 3vw, 0.85rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .filter-chip:active {
            transform: scale(0.95);
        }

        @media (hover: hover) {
            .filter-chip:hover {
                border-color: rgba(255, 255, 255, 0.3);
                color: rgba(255, 255, 255, 0.7);
            }
        }

        .filter-chip.active.facile {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
            border-color: rgba(46, 213, 115, 0.5);
        }

        .filter-chip.active.moyen {
            background: rgba(255, 165, 2, 0.2);
            color: #ffa502;
            border-color: rgba(255, 165, 2, 0.5);
        }

        .filter-chip.active.avance {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            border-color: rgba(233, 69, 96, 0.5);
        }

        .hint {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 16px;
        }

        /* Animation d'entrée */
        .fade-in {
            animation: fadeSlide 0.5s ease forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .difficulty {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .difficulty.facile {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .difficulty.moyen {
            background: rgba(255, 165, 2, 0.2);
            color: #ffa502;
            border: 1px solid rgba(255, 165, 2, 0.3);
        }

        .difficulty.avance {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            padding-bottom: env(safe-area-inset-bottom, 10px);
        }

        .list-toggle {
            margin-top: 14px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.25);
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.2s;
        }

        .list-toggle:active,
        .list-toggle:hover {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Panel liste */
        .list-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .list-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .list-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 85dvh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px 20px 0 0;
            z-index: 101;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .list-panel.open {
            transform: translateY(0);
        }

        .list-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }

        .list-panel-header h2 {
            font-size: 1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
        }

        .list-panel-close {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .list-handle {
            width: 36px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            margin: 10px auto 0;
            flex-shrink: 0;
        }

        .list-body {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 8px 16px 16px;
            overscroll-behavior: contain;
        }

        .list-section {
            margin-bottom: 16px;
        }

        .list-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 4px;
            position: sticky;
            top: 0;
            background: linear-gradient(180deg, #1a1a2e, #16213e);
            z-index: 1;
        }

        .list-section-title.facile { color: #2ed573; }
        .list-section-title.moyen { color: #ffa502; }
        .list-section-title.avance { color: #e94560; }

        .list-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            border-radius: 10px;
            transition: background 0.15s;
        }

        .list-item:active {
            background: rgba(255, 255, 255, 0.06);
        }

        .list-item-icon {
            width: 52px;
            height: 52px;
            min-width: 52px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .list-item-icon svg {
            width: 36px;
            height: 36px;
        }

        .list-item-text {
            flex: 1;
            min-width: 0;
        }

        .list-item-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 2px;
        }

        .list-item-desc {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @media (max-width: 380px) {
            body {
                padding: 12px;
            }

            .filters {
                gap: 8px;
                margin-bottom: 16px;
            }
        }

        @media (max-height: 700px) {
            h1 {
                margin-bottom: 12px;
            }

            .illustration {
                width: 130px;
                height: 130px;
                margin-bottom: 14px;
            }

            .position-desc {
                margin-bottom: 12px;
            }

            footer {
                margin-top: 12px;
            }
        }
    </style>
</head>
<body>

    <h1>Position Generator</h1>

    <div class="filters">
        <div class="filter-chip active facile" data-level="facile" onclick="toggleFilter(this)">Facile</div>
        <div class="filter-chip active moyen" data-level="moyen" onclick="toggleFilter(this)">Moyen</div>
        <div class="filter-chip active avance" data-level="avance" onclick="toggleFilter(this)">Avancé</div>
    </div>

    <div class="card" id="card" onclick="generate()">
        <div class="illustration" id="illustration" onclick="toggleView(event)">
            <span class="view-toggle-hint" id="viewToggleHint"></span>
        </div>
        <div class="difficulty" id="difficulty"></div>
        <div class="position-name" id="positionName"></div>
        <div class="position-desc" id="positionDesc"></div>
        <div class="hint" id="hint">Touche pour générer</div>
    </div>

    <div class="list-toggle" onclick="openList()">Voir toutes les positions</div>

    <footer>Have fun !</footer>

    <!-- Panel liste -->
    <div class="list-overlay" id="listOverlay" onclick="closeList()"></div>
    <div class="list-panel" id="listPanel">
        <div class="list-handle"></div>
        <div class="list-panel-header">
            <h2>Toutes les positions</h2>
            <button class="list-panel-close" onclick="closeList()">&times;</button>
        </div>
        <div class="list-body" id="listBody"></div>
    </div>

    <script>
        const positions = [
            {
                name: "Missionnaire",
                desc: "Le classique indémodable. Face à face, l'un allongé sur l'autre. Parfait pour l'intimité et le contact visuel.",
                difficulty: "facile",
                svg: `<svg viewBox="0 0 160 160" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Personne en dessous -->
                    <circle cx="30" cy="100" r="10"/>
                    <line x1="40" y1="100" x2="100" y2="105"/>
                    <line x1="100" y1="105" x2="130" y2="130"/>
                    <line x1="100" y1="105" x2="125" y2="85"/>
                    <line x1="50" y1="95" x2="55" y2="75"/>
                    <line x1="50" y1="105" x2="55" y2="125"/>
                    <!-- Personne au dessus -->
                    <circle cx="45" cy="60" r="10" stroke="#e94560"/>
                    <line x1="55" y1="65" x2="95" y2="85" stroke="#e94560"/>
                    <line x1="95" y1="85" x2="115" y2="110" stroke="#e94560"/>
                    <line x1="95" y1="85" x2="120" y2="70" stroke="#e94560"/>
                    <line x1="65" y1="70" x2="45" y2="85" stroke="#e94560"/>
                    <line x1="65" y1="75" x2="70" y2="95" stroke="#e94560"/>
                </svg>`
            },
            {
                name: "Levrette",
                desc: "Un classique aussi. L'un à quatre pattes, l'autre derrière. Permet de varier les angles et l'intensité.",
                difficulty: "facile",
                svg: `<svg viewBox="0 0 160 160" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Personne devant à 4 pattes -->
                    <circle cx="40" cy="55" r="10"/>
                    <line x1="50" y1="58" x2="85" y2="70"/>
                    <line x1="85" y1="70" x2="70" y2="110"/>
                    <line x1="85" y1="70" x2="100" y2="110"/>
                    <line x1="55" y1="62" x2="35" y2="100"/>

                    <line x1="105" y1="80" x2="90" y2="115" stroke="#e94560"/>

            {
                name: "Amazone",

                    <line x1="80" y1="90" x2="60" y2="115" stroke="#e94560"/>
                    <line x1="80" y1="90" x2="100" y2="115" stroke="#e94560"/>
                    <line x1="80" y1="70" x2="60" y2="60" stroke="#e94560"/>

            },
            {
                name: "Amazone inversée",

                difficulty: "moyen",

                    <circle cx="85" cy="50" r="10" stroke="#e94560"/>

            {

                svg: `<svg viewBox="0 0 160 160" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

                    <circle cx="45" cy="60" r="10"/>

                    <line x1="55" y1="110" x2="65" y2="140"/>

                    <line x1="80" y1="108" x2="90" y2="138" stroke="#e94560"/>

            },
            {
                name: "Lotus",
                desc: "L'un assis en tailleur, l'autre sur ses genoux face à face, jambes enroulées. Ultra intime, beaucoup de contact.",
                difficulty: "moyen",
                svg: `<svg viewBox="0 0 160 160" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Personne assise -->
                    <circle cx="70" cy="45" r="10"/>
                    <line x1="70" y1="55" x2="70" y2="95"/>
                    <path d="M 70 95 Q 45 105 40 115"/>
                    <path d="M 70 95 Q 95 105 100 115"/>
                    <line x1="70" y1="70" x2="45" y2="65"/>
                    <line x1="70" y1="70" x2="95" y2="65"/>
                    <!-- Personne sur les genoux -->
                    <circle cx="85" cy="35" r="10" stroke="#e94560"/>
                    <line x1="85" y1="45" x2="82" y2="85" stroke="#e94560"/>
                    <path d="M 82 85 Q 60 100 50 95" stroke="#e94560"/>

            },
            {
                name: "Andromaque",
                desc: "L'un assis sur une chaise ou bord du lit, l'autre sur ses genoux face à face. Bon contrôle et intimité.",
                difficulty: "facile",
                svg: `<svg viewBox="0 0 160 160" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Chaise -->
                    <rect x="50" y="85" width="45" height="5" rx="2" stroke="rgba(255,255,255,0.3)"/>

                    <line x1="92" y1="85" x2="92" y2="55" stroke="rgba(255,255,255,0.3)"/>
                    <!-- Personne assise -->
                    <circle cx="72" cy="50" r="10"/>
                    <line x1="72" y1="60" x2="72" y2="88"/>
                    <line x1="72" y1="88" x2="50" y2="120"/>
                    <line x1="72" y1="88" x2="95" y2="120"/>
                    <line x1="72" y1="72" x2="52" y2="78"/>

                    <circle cx="72" cy="20" r="10" stroke="#e94560"/>
                    <line x1="72" y1="30" x2="72" y2="65" stroke="#e94560"/>

                    <line x1="72" y1="65" x2="96" y2="88" stroke="#e94560"/>
                    <line x1="72" y1="42" x2="55" y2="35" stroke="#e94560"/>

            },
            {
                name: "69",
                desc: "Tête-bêche, plaisir oral mutuel simultané. L'un au-dessus ou côte à côte, chacun s'occupe de l'autre.",
                difficulty: "facile",
                svg: `<svg viewBox="0 0 160 160" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Personne 1 -->
                    <circle cx="30" cy="65" r="10"/>
                    <line x1="40" y1="67" x2="90" y2="75"/>
                    <line x1="90" y1="75" x2="115" y2="55"/>
                    <line x1="90" y1="75" x2="120" y2="90"/>
                    <line x1="55" y1="65" x2="50" y2="50"/>

                    <!-- Personne 2 inversée -->
                    <circle cx="130" cy="100" r="10" stroke="#e94560"/>
                    <line x1="120" y1="98" x2="70" y2="90" stroke="#e94560"/>
                    <line x1="70" y1="90" x2="45" y2="110" stroke="#e94560"/>
                    <line x1="70" y1="90" x2="40" y2="75" stroke="#e94560"/>
                    <line x1="105" y1="100" x2="110" y2="115" stroke="#e94560"/>

                    <line x1="65" y1="100" x2="62" y2="125" stroke="#e94560"/>
                    <line x1="85" y1="80" x2="105" y2="100" stroke="#e94560"/>
                    <line x1="105" y1="100" x2="108" y2="125" stroke="#e94560"/>
                    <line x1="88" y1="62" x2="70" y2="58" stroke="#e94560"/>
                    <line x1="88" y1="62" x2="108" y2="55" stroke="#e94560"/>
                </svg>`
            }
        ];

        const IMG_BASE = 'https://raw.githubusercontent.com/vise950/Libido/master/assets/images/';
        const IMG_MAP = {
            'Missionnaire': 'ic_classic.png',
            'Levrette': 'ic_doggy_style.png',
            'Amazone': 'ic_amazon.png',
            'Amazone inversée': 'ic_reverse_cowgirl.png',
            'Cuillère': 'ic_slip.png',
            'Lotus': 'ic_lotus_blossom.png',
            'Andromaque': 'ic_rocking_horse.png',
            '69': 'ic_super_8.png',
            'Brouette': 'ic_standing_wheelbarrow.png',
            "L'union du loup": 'ic_lustful_leg.png',
            'Le pont': 'ic_bridge.png',
            'La balançoire': 'ic_lap_top.png',
            "L'étoile de mer": 'ic_star.png',
            'Debout face à face': 'ic_balancing_act.png',
            'La chaise longue': 'ic_deckchair.png',
            'Le berceau': 'ic_seduction.png',
            'La grenouille': 'ic_frog.png',
            'Le ciseaux': 'ic_crisscross.png',
            'La pieuvre': 'ic_spider.png',
            'Le porteur': 'ic_suspended_congress.png',
            "L'équerre": 'ic_right_angle.png',
            'La chaise': 'ic_backward_slide.png',
            "L'arbre à souhaits": 'ic_padlock.png',
            'La danse du loup': 'ic_from_behind.png',
            'Le papillon': 'ic_butterfly.png',
            'La planche': 'ic_nirvana.png',
            'Le toboggan': 'ic_prone_tiger.png',
            'Le pilier': 'ic_kneel.png',
            'La cascade': 'ic_waterfall.png',
            'Le trône': 'ic_close_up.png',
            'La brouette japonaise': 'ic_sphinx.png',
            'Le vautour': 'ic_squat_balance.png',
            'Le rodéo': 'ic_rider.png',
            'Le dromadaire': 'ic_hound.png',
            'La pirouette': 'ic_side_saddle.png',
            "L'enclume": 'ic_fold.png',
            'La toupie': 'ic_propeller.png',
            'Le X': 'ic_x_rated.png',
            'La catapulte': 'ic_shoulder_holder.png',
            'La sirène': 'ic_mermaid.png'
        };

        // Précharger les images
        Object.values(IMG_MAP).forEach(f => { const i = new Image(); i.src = IMG_BASE + f; });

        let lastIndex = -1;
        let activeFilters = new Set(['facile', 'moyen', 'avance']);
        let showingDetailed = false;

        function toggleFilter(el) {
            const level = el.dataset.level;
            if (activeFilters.has(level)) {
                if (activeFilters.size <= 1) return;
                activeFilters.delete(level);
                el.classList.remove('active');
            } else {
                activeFilters.add(level);
                el.classList.add('active');
            }
            generate();
        }

        function showPosition(pos, animate) {
            const card = document.getElementById('card');
            const illustration = document.getElementById('illustration');
            const name = document.getElementById('positionName');
            const desc = document.getElementById('positionDesc');
            const diff = document.getElementById('difficulty');

            if (animate) {
                card.classList.remove('fade-in');
                void card.offsetWidth;
                card.classList.add('fade-in');
            }

            showingDetailed = false;
            illustration.classList.remove('detailed');

            const imgFile = IMG_MAP[pos.name];
            const imgTag = imgFile
                ? `<img class="real-img" src="${IMG_BASE}${imgFile}" alt="${pos.name}" loading="lazy"/>`
                : '';
            illustration.innerHTML = pos.svg + imgTag + '<span class="view-toggle-hint">voir +</span>';

            name.textContent = pos.name;
            desc.textContent = pos.desc;
            diff.textContent = pos.difficulty === 'facile' ? 'Facile' :
                              pos.difficulty === 'moyen' ? 'Moyen' : 'Avancé';
            diff.className = 'difficulty ' + pos.difficulty;
        }

        function generate() {
            const filtered = positions.filter(p => activeFilters.has(p.difficulty));
            if (filtered.length === 0) return;

            let index;
            do {
                index = Math.floor(Math.random() * filtered.length);
            } while (filtered[index] === positions[lastIndex] && filtered.length > 1);

            const pos = filtered[index];
            lastIndex = positions.indexOf(pos);
            showPosition(pos, true);
        }

        function toggleView(e) {
            e.stopPropagation();
            if (lastIndex < 0) return;
            const pos = positions[lastIndex];
            const imgFile = IMG_MAP[pos.name];
            if (!imgFile) return;

            const illustration = document.getElementById('illustration');
            showingDetailed = !showingDetailed;

            if (showingDetailed) {
                illustration.classList.add('detailed');
                illustration.querySelector('.view-toggle-hint').textContent = '< stick';
            } else {
                illustration.classList.remove('detailed');
                illustration.querySelector('.view-toggle-hint').textContent = 'voir +';
            }
        }

        // Liste panel
        function buildList() {
            const body = document.getElementById('listBody');
            const groups = { facile: [], moyen: [], avance: [] };
            positions.forEach((p, i) => groups[p.difficulty].push({ ...p, idx: i }));

            const labels = { facile: 'Facile', moyen: 'Moyen', avance: 'Avancé' };
            let html = '';
            for (const [level, items] of Object.entries(groups)) {
                if (!items.length) continue;
                html += `<div class="list-section">
                    <div class="list-section-title ${level}">${labels[level]} (${items.length})</div>`;
                items.forEach(p => {
                    html += `<div class="list-item" onclick="selectPosition(${p.idx})">
                        <div class="list-item-icon">${p.svg}</div>
                        <div class="list-item-text">
                            <div class="list-item-name">${p.name}</div>
                            <div class="list-item-desc">${p.desc}</div>
                        </div>
                    </div>`;
                });
                html += '</div>';
            }
            body.innerHTML = html;
        }

        function selectPosition(idx) {
            lastIndex = idx;
            showPosition(positions[idx], true);
            closeList();
        }

        function openList() {
            buildList();
            document.getElementById('listOverlay').classList.add('open');
            document.getElementById('listPanel').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeList() {
            document.getElementById('listOverlay').classList.remove('open');
            document.getElementById('listPanel').classList.remove('open');
            document.body.style.overflow = '';
        }

        // Hint adaptatif
        const hint = document.getElementById('hint');
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        hint.textContent = isTouchDevice ? 'Touche pour générer' : 'Clique ou appuie sur Espace';

        // Générer au chargement
        generate();

        // Raccourci clavier (Espace)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                generate();
            }
        });

        // Swipe support (seulement en dehors de l'illustration)
        let touchStartY = 0;
        let touchStartedOnIllustration = false;
        const card = document.getElementById('card');
        card.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            touchStartedOnIllustration = e.target.closest('.illustration') !== null;
        }, { passive: true });
        card.addEventListener('touchend', (e) => {
            if (touchStartedOnIllustration) return;
            const dy = touchStartY - e.changedTouches[0].clientY;
            if (Math.abs(dy) > 40) generate();
        }, { passive: true });
    </script>
</body>
</html>
