<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Positions">
    <title>Position Generator</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64' fill='none' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect width='64' height='64' rx='12' fill='%231a1a2e'/%3E%3Ccircle cx='14' cy='38' r='5' stroke='white' stroke-width='2'/%3E%3Cline x1='19' y1='38' x2='42' y2='40' stroke='white' stroke-width='2'/%3E%3Cline x1='42' y1='40' x2='54' y2='52' stroke='white' stroke-width='2'/%3E%3Cline x1='42' y1='40' x2='52' y2='32' stroke='white' stroke-width='2'/%3E%3Cline x1='24' y1='36' x2='26' y2='28' stroke='white' stroke-width='2'/%3E%3Cline x1='24' y1='40' x2='26' y2='48' stroke='white' stroke-width='2'/%3E%3Ccircle cx='22' cy='22' r='5' stroke='%23e94560' stroke-width='2'/%3E%3Cline x1='27' y1='25' x2='40' y2='33' stroke='%23e94560' stroke-width='2'/%3E%3Cline x1='40' y1='33' x2='50' y2='42' stroke='%23e94560' stroke-width='2'/%3E%3Cline x1='40' y1='33' x2='50' y2='26' stroke='%23e94560' stroke-width='2'/%3E%3Cline x1='31' y1='27' x2='22' y2='34' stroke='%23e94560' stroke-width='2'/%3E%3Cline x1='31' y1='30' x2='34' y2='38' stroke='%23e94560' stroke-width='2'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        h1 {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: clamp(20px, 5vw, 40px);
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            cursor: pointer;
            touch-action: manipulation;
        }

        .card:active {
            transform: scale(0.97);
        }

        @media (hover: hover) {
            .card:hover {
                transform: translateY(-2px);
            }
        }

        .illustration {
            width: clamp(150px, 50vw, 220px);
            height: clamp(150px, 50vw, 220px);
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(233, 69, 96, 0.3);
            overflow: hidden;
        }

        .illustration img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(233, 69, 96, 0.3));
        }

        .illustration svg {
            width: 75%;
            height: 75%;
        }

        .position-name {
            font-size: clamp(1.2rem, 4.5vw, 1.6rem);
            font-weight: 700;
            margin-bottom: 10px;
            color: #ff6b6b;
        }

        .position-desc {
            font-size: clamp(0.85rem, 3vw, 0.95rem);
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }

        .filters {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 10px 20px;
            border-radius: 50px;
            font-size: clamp(0.8rem, 3vw, 0.85rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .filter-chip:active {
            transform: scale(0.95);
        }

        @media (hover: hover) {
            .filter-chip:hover {
                border-color: rgba(255, 255, 255, 0.3);
                color: rgba(255, 255, 255, 0.7);
            }
        }

        .filter-chip.active.facile {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
            border-color: rgba(46, 213, 115, 0.5);
        }

        .filter-chip.active.moyen {
            background: rgba(255, 165, 2, 0.2);
            color: #ffa502;
            border-color: rgba(255, 165, 2, 0.5);
        }

        .filter-chip.active.avance {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            border-color: rgba(233, 69, 96, 0.5);
        }

        .hint {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 16px;
        }

        .fade-in {
            animation: fadeSlide 0.5s ease forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .difficulty {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .difficulty.facile {
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .difficulty.moyen {
            background: rgba(255, 165, 2, 0.2);
            color: #ffa502;
            border: 1px solid rgba(255, 165, 2, 0.3);
        }

        .difficulty.avance {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            padding-bottom: env(safe-area-inset-bottom, 10px);
        }

        .list-toggle {
            margin-top: 14px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.25);
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: color 0.2s;
        }

        .list-toggle:active,
        .list-toggle:hover {
            color: rgba(255, 255, 255, 0.5);
        }

        .list-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .list-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .list-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 85dvh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px 20px 0 0;
            z-index: 101;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .list-panel.open {
            transform: translateY(0);
        }

        .list-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }

        .list-panel-header h2 {
            font-size: 1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
        }

        .list-panel-close {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .list-handle {
            width: 36px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            margin: 10px auto 0;
            flex-shrink: 0;
        }

        .list-body {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 8px 16px 16px;
            overscroll-behavior: contain;
        }

        .list-section {
            margin-bottom: 16px;
        }

        .list-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 4px;
            position: sticky;
            top: 0;
            background: linear-gradient(180deg, #1a1a2e, #16213e);
            z-index: 1;
        }

        .list-section-title.facile { color: #2ed573; }
        .list-section-title.moyen { color: #ffa502; }
        .list-section-title.avance { color: #e94560; }

        .list-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            border-radius: 10px;
            transition: background 0.15s, transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .list-item:active {
            background: rgba(255, 255, 255, 0.06);
        }

        .list-item-swipe-hint {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: rgba(233, 69, 96, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: width 0.2s;
            pointer-events: none;
            border-radius: 10px 0 0 10px;
        }

        .list-item-swipe-hint svg {
            width: 20px;
            height: 20px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .list-item.swiping .list-item-swipe-hint {
            width: 60px;
        }

        .list-item.swiping .list-item-swipe-hint svg {
            opacity: 1;
        }

        .list-item-icon {
            width: 52px;
            height: 52px;
            min-width: 52px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .list-item-icon img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .list-item-icon svg {
            width: 36px;
            height: 36px;
        }

        .list-item-text {
            flex: 1;
            min-width: 0;
        }

        .list-item-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 2px;
        }

        .list-item-desc {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Zoom overlay */
        .zoom-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            cursor: zoom-out;
            padding: 20px;
        }

        .zoom-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .zoom-overlay img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(233, 69, 96, 0.4));
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .zoom-overlay.open img {
            transform: scale(1);
        }

        .zoom-hint {
            position: absolute;
            bottom: 24px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
        }

        .illustration {
            cursor: zoom-in;
        }

        .fav-btn {
            position: absolute;
            top: clamp(12px, 3vw, 20px);
            right: clamp(12px, 3vw, 20px);
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            z-index: 2;
        }

        .fav-btn svg {
            width: 20px;
            height: 20px;
            transition: all 0.25s ease;
        }

        .fav-btn:active {
            transform: scale(0.85);
        }

        .fav-btn.active svg {
            fill: #e94560;
            stroke: #e94560;
        }

        .fav-filter {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            margin: 0 16px 8px;
            border-radius: 12px;
            background: rgba(233, 69, 96, 0.08);
            border: 1px solid rgba(233, 69, 96, 0.15);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            flex-shrink: 0;
        }

        .fav-filter.active {
            background: rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.4);
            color: #e94560;
        }

        .fav-filter svg {
            width: 14px;
            height: 14px;
        }

        .list-item-fav {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            margin-left: auto;
        }

        .list-item-fav svg {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 380px) {
            body {
                padding: 12px;
            }

            .filters {
                gap: 8px;
                margin-bottom: 16px;
            }
        }

        @media (max-height: 700px) {
            h1 {
                margin-bottom: 12px;
            }

            .illustration {
                width: 130px;
                height: 130px;
                margin-bottom: 14px;
            }

            .position-desc {
                margin-bottom: 12px;
            }

            footer {
                margin-top: 12px;
            }
        }
    </style>
</head>
<body>

    <h1>Position Generator</h1>

    <div class="filters">
        <div class="filter-chip active facile" data-level="facile" onclick="toggleFilter(this)">Facile</div>
        <div class="filter-chip active moyen" data-level="moyen" onclick="toggleFilter(this)">Moyen</div>
        <div class="filter-chip active avance" data-level="avance" onclick="toggleFilter(this)">Avancé</div>
    </div>

    <div class="card" id="card" onclick="generate()" style="position:relative">
        <button class="fav-btn" id="favBtn" onclick="toggleFav(event)" title="Ajouter aux favoris">
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <div class="illustration" id="illustration" onclick="openZoom(event)"></div>
        <div class="difficulty" id="difficulty"></div>
        <div class="position-name" id="positionName"></div>
        <div class="position-desc" id="positionDesc"></div>
        <div class="hint" id="hint">Touche pour générer</div>
    </div>

    <div class="list-toggle" onclick="openList()">Voir toutes les positions</div>

    <footer>Have fun !</footer>

    <div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom()">
        <img id="zoomImg" src="" alt=""/>
        <span class="zoom-hint">Touche pour fermer</span>
    </div>

    <div class="list-overlay" id="listOverlay" onclick="closeList()"></div>
    <div class="list-panel" id="listPanel">
        <div class="list-handle"></div>
        <div class="list-panel-header">
            <h2>Toutes les positions</h2>
            <button class="list-panel-close" onclick="closeList()">&times;</button>
        </div>
        <div style="display:flex;gap:8px;padding:0 16px 8px;flex-shrink:0">
            <div class="fav-filter" id="favFilter" onclick="toggleFavFilter()" style="flex:1;margin:0">
                <svg viewBox="0 0 24 24" fill="#e94560" stroke="#e94560" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                <span id="favFilterLabel">Favoris (0)</span>
            </div>
            <div class="fav-filter" id="favClear" onclick="clearFavorites()" style="margin:0;display:none">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                <span>Tout supprimer</span>
            </div>
        </div>
        <div class="list-body" id="listBody"></div>
    </div>

    <script>
        const IMG_BASE = 'https://raw.githubusercontent.com/vise950/Libido/master/assets/images/';

        const positions = [
            // ===== FACILE =====
            {
                name: "Missionnaire",
                desc: "Le classique indémodable. Face à face, l'un allongé sur l'autre. Parfait pour l'intimité et le contact visuel.",
                difficulty: "facile",
                img: "ic_classic.png"
            },
            {
                name: "Levrette",
                desc: "Un classique aussi. L'un à quatre pattes, l'autre derrière. Permet de varier les angles et l'intensité.",
                difficulty: "facile",
                img: "ic_doggy_style.png"
            },
            {
                name: "Amazone",
                desc: "Elle est assise sur lui, face à face. Elle contrôle le rythme et la profondeur. Très intime.",
                difficulty: "facile",
                img: "ic_amazon.png"
            },
            {
                name: "Cuillère",
                desc: "Allongés sur le côté, emboîtés l'un contre l'autre. Doux, tendre et parfait pour le matin.",
                difficulty: "facile",
                img: "ic_slide.png"
            },
            {
                name: "Andromaque",
                desc: "Elle chevauche, mains posées sur son torse. Un classique qui donne le contrôle total.",

            {
                name: "69",

                svg: `<svg viewBox="0 0 160 160" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

                    <line x1="40" y1="65" x2="90" y2="60"/>

            {

                difficulty: "facile",
                img: "ic_deckchair.png"
            },
            {
                name: "La séduction",
                desc: "Position allongée très intime, corps enlacés, visages proches. Tendresse et sensualité.",

                img: "ic_seduction.png"
            },
            {
                name: "Le nirvana",
                desc: "Variante du missionnaire où elle garde les jambes serrées. Plus de friction, sensations décuplées.",
                difficulty: "facile",
                img: "ic_nirvana.png"
            },
            {
                name: "Le tigre couché",
                desc: "Elle est à plat ventre, lui par-dessus. Pénétration douce avec tout le poids du corps en contact.",
                difficulty: "facile",
                img: "ic_prone_tiger.png"
            },
            {
                name: "Le papillon",
                desc: "Elle est allongée au bord du lit, jambes relevées. Il se tient debout devant elle.",
                difficulty: "facile",
                img: "ic_butterfly.png"
            },
            {
                name: "Le X",
                desc: "Allongés en forme de X, jambes entrelacées. Mouvements lents et sensuels, contact total.",
                difficulty: "facile",
                img: "ic_x_rated.png"
            },

        // Précharger les images
        positions.forEach(p => {
            if (p.img) {
                const i = new Image();
                i.src = IMG_BASE + p.img;
            }
        });

        let lastIndex = -1;
        let activeFilters = new Set(['facile', 'moyen', 'avance']);
        let favorites = new Set(JSON.parse(localStorage.getItem('favorites') || '[]'));
        let showFavOnly = false;

        function toggleFilter(el) {
            const level = el.dataset.level;
            if (activeFilters.has(level)) {
                if (activeFilters.size <= 1) return;
                activeFilters.delete(level);
                el.classList.remove('active');
            } else {
                activeFilters.add(level);
                el.classList.add('active');
            }
            generate();
        }

        function showPosition(pos, animate) {
            const card = document.getElementById('card');
            const illustration = document.getElementById('illustration');
            const name = document.getElementById('positionName');
            const desc = document.getElementById('positionDesc');
            const diff = document.getElementById('difficulty');

            if (animate) {
                card.classList.remove('fade-in');
                void card.offsetWidth;
                card.classList.add('fade-in');
            }

            if (pos.img) {
                illustration.innerHTML = `<img src="${IMG_BASE}${pos.img}" alt="${pos.name}" loading="lazy"/>`;
            } else if (pos.svg) {
                illustration.innerHTML = pos.svg;
            }

            name.textContent = pos.name;
            desc.textContent = pos.desc;
            diff.textContent = pos.difficulty === 'facile' ? 'Facile' :
                              pos.difficulty === 'moyen' ? 'Moyen' : 'Avancé';
            diff.className = 'difficulty ' + pos.difficulty;
            document.getElementById('favBtn').classList.toggle('active', favorites.has(pos.name));
        }

        function generate() {
            const filtered = positions.filter(p => activeFilters.has(p.difficulty));
            if (filtered.length === 0) return;

            let index;
            do {
                index = Math.floor(Math.random() * filtered.length);
            } while (filtered[index] === positions[lastIndex] && filtered.length > 1);

            const pos = filtered[index];
            lastIndex = positions.indexOf(pos);
            showPosition(pos, true);
        }

        function openZoom(e) {
            e.stopPropagation();
            if (lastIndex < 0) return;
            const pos = positions[lastIndex];
            const src = pos.img ? IMG_BASE + pos.img : '';
            if (!src) return;
            document.getElementById('zoomImg').src = src;
            document.getElementById('zoomImg').alt = pos.name;
            document.getElementById('zoomOverlay').classList.add('open');
        }

        function closeZoom() {
            document.getElementById('zoomOverlay').classList.remove('open');
        }

        function toggleFav(e) {
            e.stopPropagation();
            if (lastIndex < 0) return;
            const name = positions[lastIndex].name;
            if (favorites.has(name)) {
                favorites.delete(name);
            } else {
                favorites.add(name);
            }
            localStorage.setItem('favorites', JSON.stringify([...favorites]));
            document.getElementById('favBtn').classList.toggle('active', favorites.has(name));
        }

        function toggleFavFilter() {
            showFavOnly = !showFavOnly;
            document.getElementById('favFilter').classList.toggle('active', showFavOnly);
            buildList();
        }

        function clearFavorites() {
            if (!favorites.size) return;
            favorites.clear();
            localStorage.setItem('favorites', '[]');
            if (lastIndex >= 0) document.getElementById('favBtn').classList.remove('active');
            buildList();
        }

        function buildList() {
            const body = document.getElementById('listBody');
            const groups = { facile: [], moyen: [], avance: [] };
            positions.forEach((p, i) => {
                if (showFavOnly && !favorites.has(p.name)) return;
                groups[p.difficulty].push({ ...p, idx: i });
            });

            document.getElementById('favFilterLabel').textContent = `Favoris (${favorites.size})`;
            document.getElementById('favClear').style.display = favorites.size ? 'flex' : 'none';

            const labels = { facile: 'Facile', moyen: 'Moyen', avance: 'Avancé' };
            let html = '';
            for (const [level, items] of Object.entries(groups)) {
                if (!items.length) continue;
                html += `<div class="list-section">
                    <div class="list-section-title ${level}">${labels[level]} (${items.length})</div>`;
                items.forEach(p => {
                    const icon = p.img
                        ? `<img src="${IMG_BASE}${p.img}" alt="${p.name}" loading="lazy"/>`
                        : (p.svg || '');
                    const heart = favorites.has(p.name)
                        ? '<svg viewBox="0 0 24 24" fill="#e94560" stroke="#e94560" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'
                        : '';
                    html += `<div class="list-item" data-idx="${p.idx}" onclick="selectPosition(${p.idx})">
                        <div class="list-item-swipe-hint"><svg viewBox="0 0 24 24" fill="#e94560" stroke="#e94560" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
                        <div class="list-item-icon">${icon}</div>
                        <div class="list-item-text">
                            <div class="list-item-name">${p.name}</div>
                            <div class="list-item-desc">${p.desc}</div>
                        </div>
                        <div class="list-item-fav">${heart}</div>
                    </div>`;
                });
                html += '</div>';
            }
            if (showFavOnly && !html) {
                html = '<div style="text-align:center;padding:40px 20px;color:rgba(255,255,255,0.3)">Aucun favori pour le moment</div>';
            }
            body.innerHTML = html;
        }

        function selectPosition(idx) {
            lastIndex = idx;
            showPosition(positions[idx], true);
            closeList();
        }

        function openList() {
            buildList();
            document.getElementById('listOverlay').classList.add('open');
            document.getElementById('listPanel').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeList() {
            document.getElementById('listOverlay').classList.remove('open');
            document.getElementById('listPanel').classList.remove('open');
            document.body.style.overflow = '';
        }

        // Hint adaptatif
        const hint = document.getElementById('hint');
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        hint.textContent = isTouchDevice ? 'Touche pour générer' : 'Clique ou appuie sur Espace';

        // Générer au chargement
        generate();

        // Raccourci clavier (Espace)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Escape') return closeZoom();
            if (e.code === 'Space') {
                e.preventDefault();
                generate();
            }
        });

        // Swipe-to-fav in list
        (function() {
            const listBody = document.getElementById('listBody');
            let startX = 0, startY = 0, swiping = null, moved = false;
            listBody.addEventListener('touchstart', (e) => {
                const item = e.target.closest('.list-item');
                if (!item) return;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                swiping = item;
                moved = false;
            }, { passive: true });
            listBody.addEventListener('touchmove', (e) => {
                if (!swiping) return;
                const dx = e.touches[0].clientX - startX;
                const dy = Math.abs(e.touches[0].clientY - startY);
                if (dy > 30) { swiping.classList.remove('swiping'); swiping = null; return; }
                if (dx > 30) { swiping.classList.add('swiping'); moved = true; }
                else { swiping.classList.remove('swiping'); }
            }, { passive: true });
            listBody.addEventListener('touchend', (e) => {
                if (!swiping) return;
                if (moved && swiping.classList.contains('swiping')) {
                    const idx = parseInt(swiping.dataset.idx);
                    const name = positions[idx].name;
                    if (favorites.has(name)) favorites.delete(name);
                    else favorites.add(name);
                    localStorage.setItem('favorites', JSON.stringify([...favorites]));
                    if (lastIndex >= 0) document.getElementById('favBtn').classList.toggle('active', favorites.has(positions[lastIndex].name));
                    buildList();
                    e.preventDefault();
                }
                if (swiping) swiping.classList.remove('swiping');
                swiping = null;
                moved = false;
            }, { passive: false });
        })();

        // Swipe support (card)
        let touchStartY = 0;
        const card = document.getElementById('card');
        card.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        card.addEventListener('touchend', (e) => {
            const dy = touchStartY - e.changedTouches[0].clientY;
            if (Math.abs(dy) > 40) generate();
        }, { passive: true });
    </script>
</body>
</html>
